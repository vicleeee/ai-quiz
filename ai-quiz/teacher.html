<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>教师后台 - AI智能答题</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/teacher.css">
</head>
<body>

<div class="container">

<!-- 登录界面 -->
<div id="login-screen">
  <div class="nav-bar">
    <div class="brand">
      <div class="brand-icon">AI</div>
      <div class="brand-text">AI 智能答题系统</div>
    </div>
    <a href="index.html" class="nav-link" style="text-decoration:none;">学生端</a>
  </div>
  <div class="page-header" style="padding-top:60px;">
    <h1>教师后台</h1>
    <p>请输入管理密码</p>
  </div>
  <div class="card">
    <div class="form-group">
      <input type="password" id="password-input" class="form-input" placeholder="请输入密码" value="admin123" autofocus>
    </div>
    <p style="text-align:center;font-size:13px;color:var(--gray-400);margin-bottom:12px;">默认密码：admin123</p>
    <button id="btn-login" class="btn btn-primary btn-block">进入后台</button>
  </div>
</div>

<!-- 仪表盘界面 -->
<div id="dashboard-screen" style="display:none;">

  <div class="teacher-hero">
    <h1>教师数据看板</h1>
    <p>查看学生答题情况，诊断学情</p>
  </div>

  <!-- 统计卡片 -->
  <div class="teacher-stats">
    <div class="teacher-stat">
      <div class="num" id="t-stat-students">0</div>
      <div class="label">参与学生</div>
    </div>
    <div class="teacher-stat">
      <div class="num" id="t-stat-classes">0</div>
      <div class="label">班级数</div>
    </div>
    <div class="teacher-stat">
      <div class="num" id="t-stat-quizzes">0</div>
      <div class="label">答题次数</div>
    </div>
    <div class="teacher-stat">
      <div class="num" id="t-stat-avg">0%</div>
      <div class="label">平均正确率</div>
    </div>
  </div>

  <!-- 筛选栏 -->
  <div class="card">
    <div class="time-filter">
      <button class="time-chip active" data-range="all" style="cursor:pointer;">全部时间</button>
      <button class="time-chip" data-range="today" style="cursor:pointer;">今天</button>
      <button class="time-chip" data-range="yesterday" style="cursor:pointer;">昨天</button>
      <button class="time-chip" data-range="week" style="cursor:pointer;">近7天</button>
    </div>
    <div class="filter-bar">
      <select id="t-filter-class" class="form-select" style="width:auto;min-width:120px;">
        <option value="__all__">全部班级</option>
      </select>
      <button class="btn btn-sm btn-outline" onclick="Teacher.refreshData()">刷新数据</button>
    </div>
  </div>

  <!-- 标签导航 -->
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="records" onclick="Teacher.switchTab('records')">做题记录</button>
    <button class="tab-btn" data-tab="errors" onclick="Teacher.switchTab('errors')">易错题汇总</button>
    <button class="tab-btn" data-tab="diagnosis" onclick="Teacher.switchTab('diagnosis')">AI学情诊断</button>
  </div>

  <!-- 做题记录 Tab -->
  <div id="tab-records" class="tab-panel">
    <div class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th>排名</th>
            <th>姓名</th>
            <th>班级</th>
            <th>答题次数</th>
            <th>最高正确率</th>
            <th>最近正确率</th>
            <th>平均用时</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="records-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 易错题 Tab -->
  <div id="tab-errors" class="tab-panel" style="display:none;">
    <div class="card">
      <div class="review-header-bar">
        <b>班级高频错题</b>
      </div>
      <div id="errors-list"></div>
    </div>
  </div>

  <!-- AI学情诊断 Tab -->
  <div id="tab-diagnosis" class="tab-panel" style="display:none;">
    <div class="card">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
        <button class="btn btn-warning" onclick="Teacher.diagnoseClass()">全班级学情诊断</button>
      </div>
      <div id="diagnosis-tab-content">
        <p style="text-align:center;color:var(--gray-400);padding:40px;">点击上方按钮，AI 将综合分析全部错题数据</p>
      </div>
      <p id="diagnosis-countdown" style="text-align:center;font-size:13px;color:var(--gray-400);display:none;"></p>
    </div>
  </div>

</div>
</div>

<!-- 详情模态框 -->
<div id="modal-detail" class="modal-overlay">
  <div class="modal-box" style="max-width:600px;">
    <button class="modal-close" onclick="Teacher.closeModal()">&times;</button>
    <div class="modal-title" id="modal-title">详情</div>
    <div id="modal-content"></div>
  </div>
</div>

<script src="js/config.js" charset="UTF-8"></script>
<script src="js/api.js" charset="UTF-8"></script>
<script src="js/storage.js" charset="UTF-8"></script>
<script src="js/teacher.js" charset="UTF-8"></script>

</body>
</html>
